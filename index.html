<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Köpekbalığı Oyunu</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>🦈 Köpekbalığı Oyunu</h1>

<div id="game-container">

    <div id="shark">⬅️</div>

    <button onclick="guess('left')">⬅️ Sol</button>
    <button onclick="guess('right')">Sağ ➡️</button>
    <button onclick="skip()">Atla</button>
    <button onclick="finishGame()">Bitir</button>

    <p id="result"></p>

</div>

<canvas id="resultChart" width="400" height="200"></canvas>

<script src="script.js"></script>

</body>
</html>
