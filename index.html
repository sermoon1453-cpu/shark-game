<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Köpekbalığı Oyunu</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-area">

    <h1>Ortadaki köpekbalığına dikkat et</h1>
    <p id="round">Tur: 0 / 35</p>

    <div class="sharks">
        <img class="shark" id="shark1">
        <img class="shark" id="shark2">
        <img class="shark" id="shark3">
    </div>

    <div class="buttons">
        <button onclick="guess('left')">SOL</button>
        <button onclick="guess('right')">SAĞ</button>
    </div>

    <p id="result"></p>

</div>

<script src="script.js"></script>

</body>
</html>
