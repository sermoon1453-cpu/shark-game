<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Köpekbalığı Oyunu</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <h1>Köpekbalığı Oyunu</h1>

    <div class="game-box">
        <div id="shark">🦈</div>

        <div class="buttons">
            <button onclick="guess('left')">SOL</button>
            <button onclick="guess('right')">SAĞ</button>
        </div>

        <button class="skip" onclick="skip()">Atla</button>
        <button class="finish" onclick="finishGame()">Bitir</button>

        <p id="result"></p>
    </div>

    <canvas id="resultChart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
