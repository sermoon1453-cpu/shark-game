<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Köpekbalığı Oyunu</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>🦈 Köpekbalığını Takip Et</h1>
<p id="round">Tur: 0 / 35</p>

<div class="game-box">
    <img id="shark" src="https://upload.wikimedia.org/wikipedia/commons/5/56/White_shark.svg">
    
    <div class="buttons">
        <button onclick="guess('left')">SOL</button>
        <button onclick="guess('right')">SAĞ</button>
    </div>

    <p id="result"></p>
</div>

<canvas id="resultChart"></canvas>

<script src="script.js"></script>

</body>
</html>
